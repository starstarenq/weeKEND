<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발더스 게이트 스타일 파티 인벤토리 장착 시스템</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-color: #1f2833;
            --accent-gold: #c5a059;
            --text-color: #c5c6c7;
            --active-tab: #66fcf1;
            --btn-save: #2d3748;
            --btn-hover: #c5a059;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-gold);
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }
        
        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            width: 1000px;
            background: #12171e;
            border: 2px solid var(--accent-gold);
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .party-navigation {
            display: flex;
            justify-content: space-between; /* 양 끝 정렬로 버튼 배치 최적화 */
            align-items: center;
            background: #0d1117;
            border-bottom: 2px solid var(--accent-gold);
            padding: 5px 15px;
        }

        .tab-wrapper {
            display: flex;
            gap: 10px;
        }

        .system-storage-controls {
            display: flex;
            gap: 8px;
        }

        .party-tab {
            background: #1a222d;
            border: 1px solid #3c4856;
            color: #9aa5b1;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .party-tab.active {
            background: var(--accent-gold);
            color: #000;
            border-color: #fff;
        }

        /* 저장 및 불러오기 버튼 스타일 디자인 */
        .btn-storage {
            background: #1c2331;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 8px 14px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-storage:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 8px rgba(197, 160, 89, 0.6);
        }

        .main-content {
            display: flex;
            height: 520px;
        }

        .character-panel {
            flex: 1;
            border-right: 1px solid #2d3748;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #1a2332 0%, #0f151f 100%);
        }

        .character-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .character-title {
            font-size: 22px;
            color: #fff;
            font-weight: bold;
        }

        .level-badge {
            font-size: 11px;
            color: var(--accent-gold);
            margin-top: 3px;
        }

        .equipment-slots {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eq-slot {
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed #4a5568;
            border-radius: 4px;
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            text-align: center;
        }

        .eq-slot.has-item {
            border: 1px solid var(--accent-gold);
            background: linear-gradient(135deg, #2c2014 0%, #151a22 100%);
        }

        .slot-placeholder {
            font-size: 12px;
            color: #555e6b;
        }

        .item-icon { font-size: 24px; }
        .item-name { font-size: 12px; color: #e2e8f0; font-weight: bold;}

        .character-stats {
            background: rgba(0,0,0,0.3);
            border: 1px solid #2d3748;
            border-radius: 4px;
            padding: 12px;
            margin-top: auto;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stat-label { color: #718096; }
        .stat-value { color: #fff; font-weight: bold; }
        .stat-value.highlight { color: var(--accent-gold); }

        .inventory-panel {
            flex: 1.2;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: #11161d;
        }

        .inventory-header {
            font-size: 16px;
            color: var(--accent-gold);
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 5px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .inventory-item {
            background: #1a222d;
            border: 1px solid #2d3748;
            border-radius: 4px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            height: 50px;
        }

        .inventory-item.empty {
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(45, 55, 72, 0.3);
            cursor: default;
        }

        .item-main { display: flex; align-items: center; gap: 10px; width: 100%; }
        .inv-icon { font-size: 22px; }
        .item-info { display: flex; flex-direction: column; }
        .inv-name { font-size: 13px; color: #fff; font-weight: bold; }
        .inv-type { font-size: 11px; color: #718096; margin-top: 2px; }

        .footer-guide {
            background: #0d1117;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
            border-top: 1px solid #2d3748;
        }
    </style>
</head>
<body>

    <h1>PARTY INVENTORY MANAGEMENT</h1>
    <div class="subtitle">모듈러 스토리지 연동 버전 (save.js / load.js / call.js 적용)</div>

    <div class="game-container">
        <!-- 상단 내비게이션 바 영역 분할 -->
        <div class="party-navigation">
            <div class="tab-wrapper" id="party-tabs"></div>
            
            <!-- 오른쪽 위 시스템 제어 버튼 컴포넌트 추가 -->
            <div class="system-storage-controls">
                <button class="btn-storage" id="btn-game-save">💾 SAVE GAME</button>
                <button class="btn-storage" id="btn-game-load">📂 LOAD GAME</button>
            </div>
        </div>

        <div class="main-content">
            <div class="character-panel">
                <div class="character-header">
                    <div class="character-title" id="char-name">로딩 중...</div>
                    <div class="level-badge">Maximum Level Reached</div>
                </div>

                <div class="equipment-slots">
                    <div class="eq-slot" id="slot-weapon"></div>
                    <div class="eq-slot" id="slot-shield"></div>
                    <div class="eq-slot" id="slot-helmet"></div>
                    <div class="eq-slot" id="slot-cloak"></div>
                </div>

                <div class="character-stats">
                    <div class="stat-row">
                        <span class="stat-label">방어도 (AC)</span>
                        <span class="stat-value highlight" id="stat-ac">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">명중 보너스 (Attack Bonus)</span>
                        <span class="stat-value" id="stat-attack">+0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">피해량 (Damage)</span>
                        <span class="stat-value" id="stat-damage">0</span>
                    </div>
                </div>
            </div>

            <div class="inventory-panel">
                <div class="inventory-header">공용 보관함 (가변 배열 구조)</div>
                <div class="inventory-grid" id="inventory-grid"></div>
            </div>
        </div>

        <div class="footer-guide">
            💡 아이템 세팅을 바꾼 뒤 우측 상단 'SAVE GAME'을 누르고 브라우저를 새로고침 한 뒤 'LOAD GAME'을 누르면 이전 상태가 완벽히 복원됩니다.
        </div>
    </div>

    <!-- 핵심 비즈니스 로직 스크립트 배치 순서 준수 -->
    <script src="player.js"></script>
    <script src="save.js"></script>
    <script src="load.js"></script>
    <script src="call.js"></script>
</body>
</html>
