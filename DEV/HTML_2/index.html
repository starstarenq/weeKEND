<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삶의 갈림길 - 보상 시뮬레이터</title>
    <style>
        body {
            background-color: #121214;
            color: #e2e8f0;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 { color: #f1f5f9; margin-bottom: 5px; }
        .sub { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }

        .status-panel {
            background: #1e1e24;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px 40px;
            display: flex;
            gap: 50px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .stat-item { font-size: 18px; font-weight: bold; }
        .stat-item span { color: #38bdf8; }

        #reward-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            min-height: 180px;
        }
        .reward-card {
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 12px;
            width: 200px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .reward-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        .reward-type {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .weapon .reward-type { background-color: #ef4444; color: white; }
        .equipment .reward-type { background-color: #3b82f6; color: white; }
        .statup .reward-type { background-color: #10b981; color: white; }

        .reward-name { font-size: 18px; font-weight: bold; margin: 15px 0 8px 0; color: #fff; }
        .reward-desc { font-size: 13px; color: #94a3b8; }

        #log-panel {
            width: 640px;
            height: 150px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
            font-size: 13px;
            color: #cbd5e1;
        }
        .log-entry { margin-bottom: 6px; }
        .log-entry.select { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body>

    <h1>삶의 갈림길 보상 시스템</h1>
    <div class="sub">기억 스테이지 클리어 후 제공되는 3가지 무작위 보상 선택 시뮬레이션입니다.</div>

    <div class="status-panel">
        <div class="stat-item">⚔️ 공격력: <span id="p-atk">10</span></div>
        <div class="stat-item">❤️ 최대 체력: <span id="p-hp">100</span></div>
    </div>

    <div id="reward-container"></div>

    <div id="log-panel">
        <div class="log-entry">⚙️ 시스템: 스테이지 클리어! 보상을 무작위로 호출합니다.</div>
    </div>

    <script>
        // ==========================================
        // 1. [reward.js 역할] Reward 클래스 정의
        // ==========================================
        class Reward {
            constructor(id, name, type, description, effect) {
                this.id = id;
                this.name = name;
                this.type = type;
                this.description = description;
                this.effect = effect; 
            }

            getTypeName() {
                switch (this.type) {
                    case 'Weapon': return '무기';
                    case 'Equipment': return '장비';
                    case 'StatUp': return '능력치';
                    default: return '일반';
                }
            }
        }

        // ==========================================
        // 2. [RewardManager.js 역할] RewardManager 클래스 정의
        // ==========================================
        class RewardManager {
            constructor() {
                this.rewardDatabase = [];
                this.initDatabase();
            }

            initDatabase() {
                // 무기 5개
                this.rewardDatabase.push(new Reward(1, "낡은 철검", "Weapon", "공격력 +10", { atk: 10 }));
                this.rewardDatabase.push(new Reward(2, "마법 지팡이", "Weapon", "공격력 +15", { atk: 15 }));
                this.rewardDatabase.push(new Reward(3, "사냥꾼 활", "Weapon", "공격력 +12", { atk: 12 }));
                this.rewardDatabase.push(new Reward(4, "암살자 단검", "Weapon", "공격력 +18", { atk: 18 }));
                this.rewardDatabase.push(new Reward(5, "성스러운 둔기", "Weapon", "공격력 +8", { atk: 8 }));

                // 장비 5개
                this.rewardDatabase.push(new Reward(6, "가죽 갑옷", "Equipment", "최대 체력 +30", { hp: 30 }));
                this.rewardDatabase.push(new Reward(7, "강철 투구", "Equipment", "최대 체력 +50", { hp: 50 }));
                this.rewardDatabase.push(new Reward(8, "신속의 장화", "Equipment", "최대 체력 +20", { hp: 20 }));
                this.rewardDatabase.push(new Reward(9, "치유의 반지", "Equipment", "최대 체력 +40", { hp: 40 }));
                this.rewardDatabase.push(new Reward(10, "마나 목걸이", "Equipment", "최대 체력 +25", { hp: 25 }));

              // 능력치 증가 5개 (하이브리드 효과)
        this.rewardDatabase.push(new Reward(11, "근력 강화", "StatUp", "공격력 +8", { atk: 8 }));
        this.rewardDatabase.push(new Reward(12, "민첩 훈련", "StatUp", "공격력 +5, 체력 +20", { atk: 5, hp: 20 }));
        this.rewardDatabase.push(new Reward(13, "지혜 깨달음", "StatUp", "체력 +85", { hp: 85 }));
        this.rewardDatabase.push(new Reward(14, "강인한 정신", "StatUp", "공격력 +10, 체력 +30", { atk: 10, hp: 30 }));
        this.rewardDatabase.push(new Reward(15, "황금의 행운", "StatUp", "공격력 +27", { atk: 27 }));
    }

            getRandomRewards(count = 3) {
                const tempPool = [...this.rewardDatabase];
                const selected = [];

                for (let i = 0; i < count; i++) {
                    if (tempPool.length === 0) break;
                    const randomIndex = Math.floor(Math.random() * tempPool.length);
                    // splice는 배열을 반환하므로 [0]을 통해 객체를 꺼내옵니다.
                    selected.push(tempPool.splice(randomIndex, 1)[0]);
                }
                return selected;
            }

            renderRewardOptions(containerId, onSelectCallback) {
                const container = document.getElementById(containerId);
                container.innerHTML = ''; 

                const currentOptions = this.getRandomRewards(3);

                currentOptions.forEach(reward => {
                    const card = document.createElement('div');
                    card.className = `reward-card ${reward.type.toLowerCase()}`;
                    card.innerHTML = `
                        <span class="reward-type">${reward.getTypeName()}</span>
                        <div class="reward-name">${reward.name}</div>
                        <div class="reward-desc">${reward.description}</div>
                    `;
                    
                    card.addEventListener('click', () => {
                        onSelectCallback(reward);
                    });

                    container.appendChild(card);
                });
            }
        }

        // ==========================================
        // 3. [index.html 구동부 역할] 실행 및 연동 코드
        // ==========================================
        const playerStatus = { atk: 10, hp: 100 };
        const manager = new RewardManager();

        function updateStatusUI() {
            document.getElementById('p-atk').innerText = playerStatus.atk;
            document.getElementById('p-hp').innerText = playerStatus.hp;
        }

        function addLog(message, isSelect = false) {
            const logPanel = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = isSelect ? 'log-entry select' : 'log-entry';
            entry.innerText = message;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function handleRewardSelection(selectedReward) {
            if (selectedReward.effect.atk) playerStatus.atk += selectedReward.effect.atk;
            if (selectedReward.effect.hp) playerStatus.hp += selectedReward.effect.hp;

            addLog(`🎁 [선택 완료] '${selectedReward.name}'을(를) 적용했습니다. (${selectedReward.description})`, true);
            updateStatusUI();

            manager.renderRewardOptions('reward-container', handleRewardSelection);
        }

        // 초기 구동 실행
        updateStatusUI();
        manager.renderRewardOptions('reward-container', handleRewardSelection);
    </script>
</body>
</html>
