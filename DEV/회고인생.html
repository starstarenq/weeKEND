<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 RPG - 회고인생</title>
    <style>
        /* 기본 테마: 기획서의 어둡고 삭막한 분위기 반영 */
        body {
            background-color: #121214;
            color: #e2e8f0;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: #1e1e24;
            border: 2px solid #3f3f46;
            border-radius: 8px;
            padding: 24px;
            width: 480px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #f43f5e;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3f3f46;
            padding-bottom: 10px;
        }

        /* 상태창 레이아웃 */
        .status-panel {
            background-color: #111113;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }

        /* 감정 게이지 시스템 바 (기획서 17p 구상도 반영) */
        .gauge-container {
            margin: 15px 0;
        }
        .gauge-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .gauge-bar-bg {
            background: linear-gradient(90deg, #ef4444 0%, #3b82f6 100%);
            height: 16px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #52525b;
        }
        .gauge-pointer {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background-color: #ffffff;
            box-shadow: 0 0 8px #ffffff;
            transition: left 0.3s ease;
        }

        /* 로그 및 상호작용 출력창 */
        .log-panel {
            background-color: #111113;
            border: 1px solid #3f3f46;
            height: 120px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        /* 입력 및 버튼 컨트롤 영역 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #27272a;
            border: 1px solid #4b5563;
            color: #ffffff;
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }

        button {
            background-color: #3f3f46;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #52525b;
        }

        button.primary {
            background-color: #f43f5e;
        }
        button.primary:hover {
            background-color: #fda4af;
            color: #121214;
        }

        button.secondary {
            background-color: #10b981;
        }
        button.secondary:hover {
            background-color: #34d399;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>회고인생 (Reminiscence Life)</h1>
    
    <!-- 실시간 상태 표시판 -->
    <div class="status-panel">
        <div class="status-row">
            <span>현재 위치: <span id="lbl-location" class="highlight">유년기 던전 - 스테이지 1</span></span>
        </div>
        <div class="status-row">
            <span>플레이어 HP: <span id="lbl-hp">1250 / 1250</span></span>
            <span>궁극기 횟수: <span id="lbl-ultimate" class="highlight">3회</span></span>
        </div>
        <div class="status-row">
            <span>데스 크리스탈: <span id="lbl-crystal">0개</span></span>
            <span>에스페란사: <span id="lbl-esperanza">1개</span></span>
        </div>

        <!-- 감정 게이지 디자인 -->
        <div class="gauge-container">
            <div class="gauge-label">
                <span style="color:#ef4444;">불행</span>
                <span id="lbl-emotion-text">현재 감정: 50.0%</span>
                <span style="color:#3b82f6;">행복</span>
            </div>
            <div class="gauge-bar-bg">
                <div id="gauge-pointer" class="gauge-pointer" style="left: 50%;"></div>
            </div>
        </div>
    </div>

    <!-- 게임 진행 메시지 로그 창 -->
    <div id="log-window" class="log-panel">게임이 시작되었습니다. 과거의 기억을 마주하세요.</div>

    <!-- 플레이어 조작 패널 -->
    <div class="control-panel">
        <button class="primary" onclick="progressStage()">1. 기억 스테이지 진행 (전투)</button>
        
        <div class="input-group">
            <input type="text" id="txt-emotion" placeholder="기억의 감정 입력 (-50.0 ~ 50.0)">
            <button onclick="submitEmotion()">감정 주입</button>
        </div>

        <button class="secondary" onclick="useEsperanza()">2. 에스페란사 사용 (HP/궁극기 회복)</button>
    </div>
</div>

<script>
    // === 게임 내부 상태 변수 (클래스 미사용) ===
    let playerHp = 1250;
    const maxHp = 1250;
    let emotionGauge = 50.0; // 0.0 ~ 100.0
    let ultimateUseCount = 3;
    let deathCrystal = 0;
    let esperanzaCount = 1;
    let currentChapter = 1; // 1: 유년기, 2: 청소년기, 3: 성인
    let currentStage = 1;
    let isGameOver = false;

    // DOM 요소 캐싱
    const logWindow = document.getElementById('log-window');

    function appendLog(message) {
        logWindow.innerText += "\n" + message;
        logWindow.scrollTop = logWindow.scrollHeight; // 스크롤을 항상 아래로
    }

    // 화면 UI 업데이트 함수
    function updateUI() {
        const chapters = ["", "유년기", "청소년기", "성인"];
        document.getElementById('lbl-location').innerText = `${chapters[currentChapter]} 던전 - 스테이지 ${currentStage}`;
        document.getElementById('lbl-hp').innerText = `${playerHp} / ${maxHp}`;
        document.getElementById('lbl-ultimate').innerText = `${ultimateUseCount}회`;
        document.getElementById('lbl-crystal').innerText = `${deathCrystal}개`;
        document.getElementById('lbl-esperanza').innerText = `${esperanzaCount}개`;
        
        // 감정 게이지 UI 동기화
        document.getElementById('lbl-emotion-text').innerText = `현재 감정: ${emotionGauge.toFixed(1)}%`;
        document.getElementById('gauge-pointer').style.left = `${emotionGauge}%`;
    }

    // 1. 기억 스테이지 진행 (전투 메커니즘)
    function progressStage() {
        if (isGameOver) return;

        // 감정 게이지 수치에 따른 가변 난이도 (불행할수록 대미지 대폭 증가)
        let damage = emotionGauge < 40.0 ? 400 : 200;
        playerHp -= damage;
        deathCrystal += 150;

        appendLog(`\n▶ [스테이지 ${currentStage}] 기억 속 전투를 완료했습니다.`);
        appendLog(`[결과] 몬스터에게 ${damage}의 피해를 받았습니다. 데스 크리스탈 +150 획득!`);

        // 사망 판정
        if (playerHp <= 0) {
            playerHp = 0;
            appendLog("\n❌ [GAME OVER] 주인공이 정신적 충격을 이기지 못하고 쓰러졌습니다. 브라우저를 새로고침 하세요.");
            isGameOver = true;
            updateUI();
            return;
        }

        // 스테이지 및 챕터 전환 관리 규칙 (5스테이지 클리어 시 다음 챕터)
        currentStage++;
        if (currentStage > 5) {
            const currentChapterName = currentChapter === 1 ? "유년기" : currentChapter === 2 ? "청소년기" : "성인";
            appendLog(`\n🎉 축하합니다! ${currentChapterName} 챕터 최종 보스를 극복했습니다!`);
            
            currentChapter++;
            currentStage = 1;
            ultimateUseCount = 3; // 다음 챕터 진입 시 궁극기 충전 규칙

            if (currentChapter > 3) {
                appendLog("\n✨ [HAPPY ENDING] 모든 과거의 기억을 정리하고 사후세계 법원으로 향합니다. 진정한 삶의 가치를 찾았습니다.");
                isGameOver = true;
            }
        }
        
        appendLog("💡 다음 기억을 진행하기 전에 이번 기억이 어땠는지 아래에 감정을 수치로 적어 주입해 보세요.");
        updateUI();
    }

    // JavaScript 기반 TryParse 구현 (감정 수치 입력 예외 처리)
    function submitEmotion() {
        if (isGameOver) return;

        const inputStr = document.getElementById('txt-emotion').value;
        
        // C#의 float.TryParse 대체 문법
        const parsedEmotion = parseFloat(inputStr);

        // TryParse 예외처리 검증 (숫자가 아니거나 공백인 경우 안전하게 통과)
        if (Number.isNaN(parsedEmotion)) {
            alert("⚠️ 올바른 숫자 형식을 입력해 주세요! (-50.0 ~ 50.0)");
            return;
        }

        // 감정 게이지 계산 및 0 ~ 100 범위 마스킹
        emotionGauge += parsedEmotion;
        if (emotionGauge < 0) emotionGauge = 0;
        if (emotionGauge > 100) emotionGauge = 100;

        appendLog(`[감정 주입] 입력한 수치(${parsedEmotion})가 반영되어 감정선이 변동되었습니다.`);
        
        // 입력창 초기화
        document.getElementById('txt-emotion').value = "";
        updateUI();
    }

    // 2. 소비 아이템 에스페란사 메커니즘 (기획서 25p 반영)
    function useEsperanza() {
        if (isGameOver) return;

        if (esperanzaCount > 0) {
            playerHp = maxHp;       // 체력 전회복
            ultimateUseCount += 1;  // 궁극기 사용 횟수 +1
            esperanzaCount--;       // 소모

            appendLog("\n✨ [아이템 사용] '에스페란사' 발동! HP가 모두 회복되고 궁극기 사용 가능 횟수가 1회 증가했습니다.");
        } else {
            appendLog("\n[알림] 소지하고 있는 에스페란사 아이템이 부족합니다.");
        }
        updateUI();
    }

    // 최초 UI 실행 시점 빌드
    updateUI();
</script>

</body>
</html>
