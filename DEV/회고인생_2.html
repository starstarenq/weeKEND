<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회고인생 (Realtime Action RPG) 시뮬레이터</title>
    <style>
        :root {
            --bg-color: #0b0b10;
            --panel-color: #161622;
            --panel-border: #2d2d3f;
            --text-color: #ffffff;
            --text-muted: #aaaab8;
            
            --normal-color: #4caf50;
            --fatigue-color: #ff9800;
            --gameover-color: #f44336;
            
            --happy-color: #4dabf7;
            --unhappy-color: #ff6b6b;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-window {
            background-color: var(--panel-color);
            border: 2px solid var(--panel-border);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        /* 헤더 타이틀 */
        .game-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 15px;
        }
        .game-header h1 {
            font-size: 26px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #e0e0ff, #9999ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .game-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
        }

        /* 최상단: 감정 게이지 시스템 */
        .emotion-system {
            background-color: #09090f;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        .emotion-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .emotion-bar-bg {
            background: linear-gradient(90deg, var(--unhappy-color) 0%, #333 50%, var(--happy-color) 100%);
            height: 16px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        .emotion-pointer {
            position: absolute;
            top: 0;
            width: 6px;
            height: 100%;
            background-color: #fff;
            box-shadow: 0 0 8px #fff;
            transition: left 0.3s ease;
        }

        /* 스테이지 정보 */
        .stage-banner {
            background-color: #1f1f30;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            color: #ffd166;
            margin-bottom: 15px;
        }

        /* 상태창 메인 패널 */
        .status-panel {
            background-color: #0f0f15;
            border: 2px solid var(--normal-color);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .badge-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .status-badge {
            padding: 5px 14px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
            background-color: var(--normal-color);
        }
        .difficulty-badge {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 체력바 */
        .hp-wrapper {
            position: relative;
            background-color: #25252d;
            height: 22px;
            border-radius: 11px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .hp-fill {
            background: linear-gradient(90deg, #ff4d4d, #ff7676);
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }
        .hp-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            line-height: 22px;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* 능력치 및 인벤토리 격자 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .info-box {
            background-color: #181824;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .info-title {
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: bold;
            border-bottom: 1px solid #2d2d3f;
            padding-bottom: 4px;
        }
        .stat-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .stat-val { font-weight: bold; color: #4dabf7; }

        /* 무대 컨트롤 액션 단추 */
        .action-group {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
        }
        .btn-battle { background-color: #c92a2a; }
        .btn-battle:hover { background-color: #a61e1e; }
        .btn-choice { background-color: #2b8a3e; }
        .btn-choice:hover { background-color: #237032; }
        .btn-item { background-color: #d9480f; }
        .btn-item:hover { background-color: #c13e0b; }
        .btn-restart {
            grid-column: span 3;
            background-color: #4c6ef5;
            display: none;
        }
        .btn-restart:hover { background-color: #3b5bdb; }

        /* 터미널 로그 시스템 */
        .terminal-log {
            margin-top: 20px;
            background-color: #08080c;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px;
            height: 140px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
            color: #c1c1cd;
        }
        .log-line { margin-bottom: 4px; }
        .log-sys { color: #ffd166; }
        .log-warn { color: #ff9800; }
        .log-danger { color: #ff4d4d; font-weight: bold; }
        .log-good { color: #4caf50; }
    </style>
</head>
<body>

<div class="game-window">
    <!-- 헤더 기획 정보 -->
    <div class="game-header">
        <h1>회고인생 (回顧人生)</h1>
        <p>후회로부터, 새로운 선택을 — Realtime Action RPG</p>
    </div>

    <!-- 1. 기획서 고유: 감정 게이지 시스템 인터페이스 -->
    <div class="emotion-system">
        <div class="emotion-header">
            <span style="color: var(--unhappy-color)">◀ 불행 (난이도 상승)</span>
            <span id="emotionText">현재 감정: 평온 (50%)</span>
            <span style="color: var(--happy-color)">행복 (난이도 하락) ▶</span>
        </div>
        <div class="emotion-bar-bg">
            <div class="emotion-pointer" id="emotionPointer" style="left: 50%;"></div>
        </div>
    </div>

    <!-- 현재 구동 스테이지 던전 구역 -->
    <div class="stage-banner" id="stageBanner">프롤로그: 무기력한 현대의 도시</div>

    <!-- 플레이어 상태 오버뷰 (기획 조건 연결) -->
    <div class="status-panel" id="statusPanel">
        <div class="badge-row">
            <div class="status-badge" id="statusBadge">일반 상태</div>
            <div class="difficulty-badge" id="diffBadge">적 난이도: 표준</div>
        </div>
        
        <div class="hp-wrapper">
            <div class="hp-fill" id="hpFill"></div>
            <div class="hp-text" id="hpText">100 / 100 (100%)</div>
        </div>

        <!-- 스펙 및 인벤토리 격자 배치 -->
        <div class="grid-container">
            <!-- 실시간 변경 스펙 -->
            <div class="info-box">
                <div class="info-title">전투 능력치 배율</div>
                <div class="stat-line">이동 속도 <span class="stat-val" id="valSpeed">1.0x</span></div>
                <div class="stat-line">방어력 스펙 <span class="stat-val" id="valDef">1.0x</span></div>
                <div class="stat-line">공격력 수치 <span class="stat-val" id="valAtk">1.0x</span></div>
            </div>
            <!-- 기획서 전용 인벤토리 재화 -->
            <div class="info-box">
                <div class="info-title">보유 아이템 / 재화</div>
                <div class="stat-line">데스 크리스탈 <span class="stat-val" id="valCrystal" style="color:#e5dbff">0개</span></div>
                <div class="stat-line">에스페란사 <span class="stat-val" id="valEsperanza" style="color:#ffd8a8">1개</span></div>
                <div class="stat-line">궁극기 가능 <span class="stat-val" id="valUlt" style="color:#ffc9c9">3 / 3회</span></div>
            </div>
        </div>
    </div>

    <!-- 실시간 컨트롤 패널 -->
    <div class="action-group">
        <button class="btn-battle" id="btnBattle">전투 (기억 탐험)</button>
        <button class="btn-choice" id="btnChoice">기억 조작 (선택)</button>
        <button class="btn-item" id="btnItem">에스페란사 사용</button>
        <button class="btn-restart" id="btnRestart">사후세계에서 환생하기 (재시작) ↻</button>
    </div>

    <!-- 터미널 텍스트 디스플레이 -->
    <div class="terminal-log" id="terminalLog">
        <div class="log-line log-sys">[시스템] 주인공이 사후세계에 입장하여 전생 메모리실 조사를 시작합니다.</div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {

        // 1. C# 구조 이식: 완벽한 안전 상태 열거형(Enum)
        const PlayerState = Object.freeze({
            Normal: 0,
