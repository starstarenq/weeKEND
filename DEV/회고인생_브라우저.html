<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회고인생 - 교정된 플레이 UI</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050508;
            font-family: 'Malgun Gothic', sans-serif;
            color: #ffffff; overflow: hidden;
        }

        /* 3D 배경 시뮬레이션 */
        .game-screen {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(20,20,35,0.4) 0%, rgba(5,5,10,1) 100%), 
                        url('https://unsplash.com') no-repeat center center;
            background-size: cover; box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* 피격 시 붉은 마진 연출 */
        .hurt-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            border: 0 solid rgba(244, 67, 54, 0.4); pointer-events: none; z-index: 999; transition: all 0.1s ease;
        }
        .hurt-overlay.active {
            border-width: 30px; box-shadow: inset 0 0 50px rgba(244, 67, 54, 0.6);
        }

        /* 상단 중앙: 감정 게이지 시스템 UI */
        .top-center-hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 460px; text-align: center; z-index: 10;
        }
        .emotion-title { font-size: 14px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 5px; }
        .emotion-bar-container { position: relative; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; }
        .emotion-bar-bg { flex: 1; height: 12px; background: linear-gradient(90deg, #ff4d4d 0%, #333 50%, #4dabf7 100%); border: 1px solid #444; border-radius: 6px; margin: 0 15px; position: relative; }
        .emotion-marker { position: absolute; top: -4px; width: 4px; height: 18px; background-color: #ffffff; box-shadow: 0 0 8px #fff; transition: left 0.3s ease; }
        .icon-deity { font-size: 18px; font-weight: bold; text-shadow: 0 0 8px currentColor; }
        .txt-unhappy { color: #ff4d4d; }
        .txt-happy { color: #4dabf7; }
        .emotion-pct { font-size: 11px; color: #ccc; margin-top: 4px; }

        /* 좌측 영역: 퀘스트 & 오큐시스의 장난 디버프 UI */
        .left-hud-panel { position: absolute; top: 30px; left: 30px; width: 260px; z-index: 10; }
        .quest-tracker { background: rgba(10, 10, 15, 0.75); border-left: 3px solid #ffd166; padding: 12px; border-radius: 0 8px 8px 0; margin-bottom: 20px; backdrop-filter: blur(4px); }
        .quest-title { font-size: 12px; color: #ffd166; font-weight: bold; margin-bottom: 6px; }
        .quest-item { font-size: 13px; margin-bottom: 4px; color: #eee; }
        .quest-sub { font-size: 12px; color: #aaa; padding-left: 10px; }
        .mischief-panel { background: rgba(30, 10, 10, 0.85); border: 1px solid #ff4d4d; border-radius: 8px; padding: 12px; animation: pulse 2s infinite ease-in-out; }
        .mischief-title { color: #ff4d4d; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .debuff-item { font-size: 12px; color: #ffb3b3; margin-bottom: 4px; }

        /* 우측 상단: 미니맵 및 타임라인 UI */
        .right-top-hud { position: absolute; top: 30px; right: 30px; text-align: right; z-index: 10; }
        .timeline-info { font-size: 13px; font-weight: bold; color: #e0e0e0; text-shadow: 0 2px 4px rgba(0,0,0,0.9); margin-bottom: 10px; }
        .minimap { width: 120px; height: 120px; background: radial-gradient(circle, rgba(20,40,30,0.7) 0%, rgba(10,15,10,0.9) 100%); border: 2px solid #555; border-radius: 50%; display: inline-block; position: relative; overflow: hidden; }
        .minimap-center { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        .minimap-enemy { position: absolute; top: 30%; left: 40%; width: 5px; height: 5px; background: #ff4d4d; border-radius: 50%; }

        /* 좌하단 구역: 플레이어 캐릭터 상태창 UI */
        .player-status-hud { position: absolute; bottom: 30px; left: 30px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        .portrait-frame { width: 70px; height: 70px; background: #111; border: 2px solid #4caf50; border-radius: 50%; overflow: hidden; position: relative; transition: border-color 0.3s; }
        .portrait-img { width: 100%; height: 100%; object-fit: cover; }
        .level-badge { position: absolute; bottom: -2px; right: -2px; background: #222; border: 1px solid #4caf50; border-radius: 4px; font-size: 11px; padding: 1px 4px; font-weight: bold; }
        .bars-container { width: 220px; }
        .bar-wrapper { position: relative; height: 18px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s ease-out; }
        .bg-hp { background: linear-gradient(180deg, #ff5252, #c92a2a); }
        .bg-mp { background: linear-gradient(180deg, #4dabf7, #1971c2); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; line-height: 18px; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        .state-text-badge { font-size: 12px; font-weight: bold; color: #4caf50; text-shadow: 0 1px 3px #000; }

        /* 우하단 구역: 스킬 퀵슬롯 인터페이스 UI */
        .skill-hud-panel { position: absolute; bottom: 30px; right: 30px; display: flex; align-items: flex-end; gap: 8px; z-index: 10; }
        .skill-slot { width: 46px; height: 46px; background: rgba(15, 15, 25, 0.85); border: 1px solid #555; border-radius: 6px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s, border-color 0.2s; }
        .skill-slot:hover { border-color: #4dabf7; transform: translateY(-2px); }
        .key-bind { position: absolute; top: 2px; left: 4px; font-size: 9px; color: #aaa; font-weight: bold; }
        .skill-icon { font-size: 18px; }
        .slot-ultimate { width: 56px; height: 56px; border: 2px solid #ff4d4d; border-radius: 8px; box-shadow: 0 0 10px rgba(255,77,77,0.4); }
        .slot-ultimate .key-bind { color: #ff7676; font-size: 10px; }
        .slot-ultimate .skill-icon { font-size: 24px; color: #ff7676; }

        .click-guide { position: absolute; bottom: 100px; right: 30px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #ffd166; text-align: right; pointer-events: none; border: 1px solid #333; }

        /* 애니메이션 키프레임 */
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(255,77,77,0.2); }
            50% { box-shadow: 0 0 20px rgba(255,77,77,0.5); border-color: #ff3333; }
            100% { box-shadow: 0 0 10px rgba(255,77,77,0.2); }
        }

        /* 검기 공격 연출 이펙트 */
        .slash-effect {
            position: absolute; top: 50%; left: 50%; width: 300px; height: 60px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: translate(-50%, -50%) rotate(-30deg) scaleX(0); pointer-events: none; z-index: 5; opacity: 0;
        }
        .slash-effect.active { animation: slashAnim 0.2s ease-out; }
        @keyframes slashAnim {
            0% { transform: translate(-50%, -50%) rotate(-30deg) scaleX(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) rotate(-15deg) scaleX(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="game-screen" id="gameScreen">
    <div class="hurt-overlay" id="hurtOverlay"></div>
    <div class="slash-effect" id="slashEffect"></div>

    <!-- 상단 콤포넌트 -->
    <div class="top-center-hud">
        <div class="emotion-title">감정 게이지 (Emotion Gauge)</div>
        <div class="emotion-bar-container">
            <span class="icon-deity txt-unhappy">😈</span>
            <div class="emotion-bar-bg">
                <div class="emotion-marker" id="emotionMarker" style="left: 32%;"></div>
            </div>
            <span class="icon-deity txt-happy">👼</span>
        </div>
        <div class="emotion-pct" id="emotionText">현재 감정: 32% (오큐시스의 장난 활성화)</div>
    </div>

    <!-- 좌측 콤포넌트 -->
    <div class="left-hud-panel">
        <div class="quest-tracker">
            <div class="quest-title">현재 기억 목표</div>
            <div class="quest-item">◆ 학교로 향하기</div>
            <div class="quest-sub">└ 친구들과 대화 수행 (1 / 3)</div>
        </div>
        <div class="mischief-panel">
            <div class="mischief-title">☠ 오큐시스의 장난 발동 중!</div>
            <div class="debuff-item">❌ 몬스터 공격력 +30%</div>
            <div class="debuff-item">❌ 스테이지 내 몬스터 수 증가</div>
            <div class="debuff-item">❌ 선제공격 전 적대 상태 돌입</div>
        </div>
    </div>

    <!-- 우측 상단 미니맵 -->
    <div class="right-top-hud">
        <div class="timeline-info">청소년기 - 3번째 기억 (밤 10:42)</div>
        <div class="minimap">
            <div class="minimap-center"></div>
            <div class="minimap-enemy"></div>
        </div>
    </div>

    <div class="click-guide">
        💥 <b>화면 빈 곳 클릭</b>: 기본 공격<br>
        ⌨ <b>스킬 슬롯 클릭 또는 단축키(1~5, Q)</b> 테스트 가능
    </div>

    <!-- 상태창 컴포넌트 -->
    <div class="player-status-hud">
        <div class="portrait-frame" id="portraitFrame">
            <img src="https://unsplash.com" class="portrait-img">
            <div class="level-badge">18</div>
        </div>
        <div class="bars-container">
            <div class="bar-wrapper">
                <div class="bar-fill bg-hp" id="hpBar" style="width: 100%;"></div>
                <div class="bar-text" id="hpText">1,250 / 1,250</div>
            </div>
            <div class="bar-wrapper">
                <div class="bar-fill bg-mp" style="width: 80%;"></div>
                <div class="bar-text">120 / 150</div>
            </div>
